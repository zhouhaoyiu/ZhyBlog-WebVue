name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm install @rolldown/binding-linux-x64-gnu@1.1.4 --no-save
      - run: npm install lightningcss-linux-x64-gnu@1.32.0 --no-save
      - run: npm run build
